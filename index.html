<div id="popup">

        <button id="close">&times;</button>

        <div class="letter">

            <h2 id="letterTitle">Letter Title</h2>

            <div id="letterContent">
                Your letter will appear here.
            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</html>
