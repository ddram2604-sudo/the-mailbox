<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Mailbox</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Georgia, serif;
      background: #f3e9dd;
      color: #2f2a26;
      overflow: hidden;
    }

    /* 🌿 ENTER SCREEN */
    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #f3e9dd;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      transition: opacity 1s ease;
      z-index: 10;
    }

    .overlay h1 {
      font-size: 34px;
      margin: 0;
    }

    .overlay p {
      margin-top: 10px;
      opacity: 0.75;
    }

    .overlay button {
      margin-top: 25px;
      padding: 10px 22px;
      border: none;
      border-radius: 20px;
      background: #2f2a26;
      color: #f3e9dd;
      cursor: pointer;
      font-size: 14px;
    }

    .overlay.fade {
      opacity: 0;
      pointer-events: none;
    }

    /* 💌 MAIN PAGE */
    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container h1 {
      font-size: 42px;
      margin: 0;
    }

    .footer {
      position: absolute;
      bottom: 30px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <!-- 🌿 ENTER SCREEN -->
  <div class="overlay" id="overlay">
    <h1>Welcome to The Mailbox</h1>
    <p>A Love Project</p>
    <button onclick="enterSite()">Open</button>
  </div>

  <!-- 💌 MAIN PAGE -->
  <div class="container">
    <h1>Letters to Arthur</h1>
    <div class="footer">from your Cindy</div>
  </div>

  <script>
    function enterSite() {
      document.getElementById("overlay").classList.add("fade");

      setTimeout(() => {
        document.getElementById("overlay").style.display = "none";
        document.body.style.overflow = "auto";
      }, 1000);
    }
  </script>

</body>
</html>
