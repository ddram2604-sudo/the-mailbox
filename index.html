<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Mailbox</title>

  <!-- CONNECTS YOUR CSS FILE -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 🌿 ENTER SCREEN -->
  <div id="overlay" class="overlay">
    <h1>Welcome to The Mailbox</h1>
    <p>A love project</p>
    <button onclick="enterSite()">Open</button>
  </div>

  <!-- 💌 MAIN SITE -->
  <div class="container">

    <h1>Letters to Arthur</h1>

    <div class="envelope" onclick="openLetter()">
      📩 Open Letter
    </div>

    <div id="letter" class="letter hidden">
      <p><strong>Dear Arthur,</strong></p>
      <p>This is your first letter. You can change this text anytime.</p>
    </div>

    <div class="footer">
      from your Cindy
    </div>

  </div>

  <!-- CONNECTS YOUR JAVASCRIPT FILE -->
  <script src="script.js"></script>

</body>
</html>
