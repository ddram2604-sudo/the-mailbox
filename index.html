<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Mailbox</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="mailbox">

    <img src="home.png" alt="Our Mailbox" usemap="#mailmap">

    <map name="mailmap">

        <area
            id="hugArea"
            shape="rect"
            coords="245,655,455,835"
            href="#">

    </map>

</div>

<div id="popup">

    <div class="envelope">

        <div class="letter">

            <h2>Open when you're needing a hug</h2>

            <p>
                This is where your beautiful letter will go.
            </p>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
